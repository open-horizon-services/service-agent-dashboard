version: '3.8'

services:
  dashboard:
    build: .
    container_name: service-agent-dashboard
    ports:
      - "5000:5000"
    volumes:
      # Mount Docker socket to access Docker API
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    # Run as root to access Docker socket
    # For production, consider using --group-add with docker GID
    user: root
    environment:
      - PYTHONUNBUFFERED=1
    # Resource limits for constrained IoT devices
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/system"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

